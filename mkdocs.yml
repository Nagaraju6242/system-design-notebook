site_name: System Design Domain Knowledge
site_description: A comprehensive guide to system design concepts for interviews and real-world engineering
theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    logo: material/book-open-variant

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true

extra_css:
  - css/completion.css

extra_javascript:
  - js/completion.js

nav:
  - Home: index.md
  - Transactions:
